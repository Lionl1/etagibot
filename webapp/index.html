<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Фильтры недвижимости Этажи</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #fff;
            --tg-theme-text-color: #000;
            --tg-theme-hint-color: #999;
            --tg-theme-button-color: #2481cc;
            --tg-theme-button-text-color: #fff;
            --tg-theme-secondary-bg-color: #efeff4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px;
        }
        .container { padding: 15px; }
        .section-title {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--tg-theme-hint-color);
            margin: 15px 0 8px 5px;
            font-weight: bold;
        }
        .form-group {
            background-color: var(--tg-theme-secondary-bg-color);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .form-row > div { flex: 1; }
        label.input-label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--tg-theme-hint-color); }
        input, select {
            width: 100%;
            padding: 8px 0;
            border: none;
            border-bottom: 1px solid #ddd;
            background-color: transparent;
            color: var(--tg-theme-text-color);
            font-size: 16px;
            outline: none;
        }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-chip {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        .filter-chip.active {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border-color: var(--tg-theme-button-color);
        }
        .footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 15px;
            background-color: var(--tg-theme-bg-color);
            border-top: 1px solid #ddd;
            z-index: 1000;
        }
        button#search-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="section-title">📍 Город</div>
        <div class="form-group">
            <select id="city">
                <option value="1">Тюмень</option>
                <option value="23">Екатеринбург</option>
                <option value="42">Москва</option>
                <option value="98">Санкт-Петербург</option>
                <option value="15">Сургут</option>
            </select>
        </div>

        <div class="section-title">🏠 Комнаты</div>
        <div class="form-group">
            <div class="checkbox-group" id="rooms-group">
                <div class="filter-chip" data-name="rooms" data-value="0">Студия</div>
                <div class="filter-chip" data-name="rooms" data-value="1">1</div>
                <div class="filter-chip" data-name="rooms" data-value="2">2</div>
                <div class="filter-chip" data-name="rooms" data-value="3">3</div>
                <div class="filter-chip" data-name="rooms" data-value=">4">4+</div>
            </div>
        </div>

        <div class="section-title">💰 Цена (руб.)</div>
        <div class="form-group">
            <div class="form-row">
                <div><input type="number" id="price_min" placeholder="От"></div>
                <div><input type="number" id="price_max" placeholder="До" value="6000000"></div>
            </div>
        </div>

        <div class="section-title">🏗 Год постройки</div>
        <div class="form-group">
            <div class="form-row">
                <div><input type="number" id="building_year_min" placeholder="От" value="2000"></div>
                <div><input type="number" id="building_year_max" placeholder="До"></div>
            </div>
        </div>

        <div class="section-title">🧱 Материал стен</div>
        <div class="form-group">
            <div class="checkbox-group" id="walls-group">
                <div class="filter-chip" data-name="wall_id" data-value="1">Кирпич</div>
                <div class="filter-chip" data-name="wall_id" data-value="2">Панель</div>
                <div class="filter-chip" data-name="wall_id" data-value="4">Монолит</div>
                <div class="filter-chip" data-name="wall_id" data-value="12">М.-Каркас</div>
            </div>
        </div>

        <div class="section-title">📐 Площадь и Этаж</div>
        <div class="form-group">
            <label class="input-label">Площадь (м²)</label>
            <div class="form-row">
                <div><input type="number" id="area_min" placeholder="От"></div>
                <div><input type="number" id="area_max" placeholder="До"></div>
            </div>
            <label class="input-label" style="margin-top:10px;">Этаж</label>
            <div class="form-row">
                <div><input type="number" id="floor_min" placeholder="От"></div>
                <div><input type="number" id="floor_max" placeholder="До"></div>
            </div>
        </div>

        <div class="section-title">🛠 Ремонт</div>
        <div class="form-group">
            <div class="checkbox-group" id="keep-group">
                <div class="filter-chip" data-name="keep" data-value="2">Косм.</div>
                <div class="filter-chip" data-name="keep" data-value="6">Совр.</div>
                <div class="filter-chip" data-name="keep" data-value="8">Дизайн.</div>
                <div class="filter-chip" data-name="keep" data-value="10">Черн.</div>
            </div>
        </div>

        <div class="section-title">🔘 Дополнительно</div>
        <div class="form-group">
            <div class="checkbox-group">
                <div class="filter-chip" data-name="is_owner" data-value="t">Собственник</div>
                <div class="filter-chip" data-name="has_photo" data-value="t">С фото</div>
            </div>
        </div>
    </div>

    <div class="footer">
        <button id="search-btn">Показать предложения</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Robust chip toggle logic
        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                this.classList.toggle('active');
            });
        });

        document.getElementById('search-btn').addEventListener('click', function() {
            let data = {
                city_id: document.getElementById('city').value,
                price_min: document.getElementById('price_min').value,
                price_max: document.getElementById('price_max').value,
                building_year_min: document.getElementById('building_year_min').value,
                building_year_max: document.getElementById('building_year_max').value,
                area_min: document.getElementById('area_min').value,
                area_max: document.getElementById('area_max').value,
                floor_min: document.getElementById('floor_min').value,
                floor_max: document.getElementById('floor_max').value,
            };

            // Collect values from chips
            let groups = ['rooms', 'wall_id', 'keep'];
            groups.forEach(name => {
                let values = [];
                document.querySelectorAll(`.filter-chip.active[data-name="${name}"]`).forEach(chip => {
                    values.push(chip.getAttribute('data-value'));
                });
                if (values.length > 0) data[name + '[]'] = values;
            });

            // Single boolean-like filters
            ['is_owner', 'has_photo'].forEach(name => {
                let chip = document.querySelector(`.filter-chip.active[data-name="${name}"]`);
                if (chip) data[name] = chip.getAttribute('data-value');
            });

            // Clean data: remove empty strings and empty arrays
            Object.keys(data).forEach(key => {
                if (data[key] === "" || (Array.isArray(data[key]) && data[key].length === 0)) {
                    delete data[key];
                }
            });

            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
